name: Build EXE

on:
  push:
    branches: [main, master]
    tags: [v*]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name Peterhack ^
            --add-data "meccha_chameleon_tools/meccha-camouflage.exe;meccha_chameleon_tools" ^
            --add-data "meccha_chameleon_tools/meccha-xenos-bridge.dll;meccha_chameleon_tools" ^
            --add-data "meccha_chameleon_tools/meccha-xenos-injector.exe;meccha_chameleon_tools" ^
            meccha_chameleon_tools/__main__.py

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Peterhack
          path: dist/Peterhack.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Peterhack.exe
          generate_release_notes: true
